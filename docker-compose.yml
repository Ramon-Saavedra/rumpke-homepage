version: '3.8'

services:
  # Frontend - Next.js Application
  frontend:
    container_name: rumpke-frontend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:4000/api}
    restart: unless-stopped
    networks:
      - rumpke-network
    # Wait for backend to be ready (uncomment when backend exists)
    # depends_on:
    #   - backend
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
